name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: List build output for debugging
        run: ls -la out/ && echo "---next folder---" && ls out/next/ 2>/dev/null || echo "No next/ folder"

      - name: Deploy via FTP
        run: node scripts/deploy.js
        env:
          FTP_HOST: ${{ secrets.NAMECHEAP_FTP_HOST }}
          FTP_USER: ${{ secrets.NAMECHEAP_FTP_USER }}
          FTP_PASS: ${{ secrets.NAMECHEAP_FTP_PASS }}
