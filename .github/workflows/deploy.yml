name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: List build output for debugging
        run: ls -la out/ && echo "---next folder---" && ls out/next/ 2>/dev/null || echo "No next/ folder"

      - name: Deploy via lftp
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -e "
            set ftp:ssl-allow no;
            set ssl:verify-certificate no;
            open ${{ secrets.NAMECHEAP_FTP_HOST }};
            user ${{ secrets.NAMECHEAP_FTP_USER }} ${{ secrets.NAMECHEAP_FTP_PASS }};
            mirror --reverse --delete --verbose=3 --parallel=5 ./out/ ./public_html/;
            quit;
          "
