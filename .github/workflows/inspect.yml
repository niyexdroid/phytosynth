name: Inspect FTP tree

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: List remote FTP tree
        run: node scripts/ftp-inspect.js
        env:
          FTP_HOST: ${{ secrets.NAMECHEAP_FTP_HOST }}
          FTP_USER: ${{ secrets.NAMECHEAP_FTP_USER }}
          FTP_PASS: ${{ secrets.NAMECHEAP_FTP_PASS }}
